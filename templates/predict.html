<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Lender | Check Eligibility</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body>
  <nav>
    <a class="brand" href="{{ url_for('home') }}">🏦 Smart Lender</a>
    <div class="links">
      <a href="{{ url_for('home') }}">Home</a>
      <a href="{{ url_for('predict_form') }}">Check Eligibility</a>
    </div>
  </nav>

  <div class="container">
    <div class="card">
      <h2>Loan Eligibility Application</h2>
      <p style="color:var(--muted); margin-top:-8px;">
        Fill in the applicant details below to get an instant prediction.
      </p>

      <form class="predict-form" action="{{ url_for('submit') }}" method="POST">
        <div class="form-group">
          <label for="gender">Gender</label>
          <select name="gender" id="gender" required>
            <option value="Male">Male</option>
            <option value="Female">Female</option>
          </select>
        </div>

        <div class="form-group">
          <label for="married">Marital Status</label>
          <select name="married" id="married" required>
            <option value="Yes">Married</option>
            <option value="No">Single</option>
          </select>
        </div>

        <div class="form-group">
          <label for="dependents">Dependents</label>
          <select name="dependents" id="dependents" required>
            <option value="0">0</option>
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3+">3+</option>
          </select>
        </div>

        <div class="form-group">
          <label for="education">Education</label>
          <select name="education" id="education" required>
            <option value="Graduate">Graduate</option>
            <option value="Not Graduate">Not Graduate</option>
          </select>
        </div>

        <div class="form-group">
          <label for="self_employed">Self Employed</label>
          <select name="self_employed" id="self_employed" required>
            <option value="No">No</option>
            <option value="Yes">Yes</option>
          </select>
        </div>

        <div class="form-group">
          <label for="property_area">Property Area</label>
          <select name="property_area" id="property_area" required>
            <option value="Urban">Urban</option>
            <option value="Semiurban">Semiurban</option>
            <option value="Rural">Rural</option>
          </select>
        </div>

        <div class="form-group">
          <label for="applicant_income">Applicant Monthly Income ($)</label>
          <input type="number" min="0" step="1" name="applicant_income" id="applicant_income" required />
        </div>

        <div class="form-group">
          <label for="coapplicant_income">Coapplicant Monthly Income ($)</label>
          <input type="number" min="0" step="1" name="coapplicant_income" id="coapplicant_income" value="0" required />
        </div>

        <div class="form-group">
          <label for="loan_amount">Loan Amount (in thousands)</label>
          <input type="number" min="1" step="1" name="loan_amount" id="loan_amount" required />
        </div>

        <div class="form-group">
          <label for="loan_amount_term">Loan Term (months)</label>
          <select name="loan_amount_term" id="loan_amount_term" required>
            <option value="360">360</option>
            <option value="300">300</option>
            <option value="240">240</option>
            <option value="180">180</option>
            <option value="120">120</option>
            <option value="84">84</option>
            <option value="60">60</option>
            <option value="36">36</option>
            <option value="12">12</option>
          </select>
        </div>

        <div class="form-group">
          <label for="credit_history">Credit History</label>
          <select name="credit_history" id="credit_history" required>
            <option value="1">Good (meets guidelines)</option>
            <option value="0">Poor / None</option>
          </select>
        </div>

        <div class="submit-row">
          <button type="submit" class="btn">Predict Eligibility →</button>
        </div>
      </form>
    </div>
  </div>

  <footer>Smart Lender &mdash; Loan Eligibility Prediction System</footer>
</body>
</html>
